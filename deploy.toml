[package]
name             = "mag-recorder"
version          = "0.1.0"
contract_version = "0.8"
license          = "MIT"

# Sigmond catalog metadata (CONTRACT v0.8 §16 non-radiod data source).
# This is what `smd list --available`, `discover_catalog_entries()`, and
# the operator-override layer in /etc/sigmond/catalog.toml read to learn
# about us.
[client]
name        = "mag-recorder"
kind        = "client"
description = "RM3100 magnetometer recorder + PSWS uploader (non-radiod, §16 'other')"
repo        = "https://github.com/HamSCI/mag-recorder"
contract    = "0.8"
# No aliases.  The alias surface in catalog.py is for legacy
# topology short-names (radiod, grape) and emits
# a DeprecationWarning at every resolve_name() call.  Introducing
# one for a brand-new client creates a deprecated short form on
# day one for no operator-typing benefit; `mag-recorder` is the
# canonical name and the only one.
# Non-radiod (§16.5): we do NOT require ka9q-radio or ka9q-python.
# The `mag-usb` C binary is bundled with this repo (bin/mag-usb +
# scripts/build-mag-usb.sh; see sigmond/docs/native-binaries.md) and
# is therefore NOT a separate sigmond catalog entry.
requires    = []
uses        = []

# Lifecycle ordering.  Magnetometer recording is independent of the
# radiod data path and doesn't feed any downstream decoder, but it
# does benefit from sigmond's authority (timing/GPSDO) being up
# first.  Same priority bucket codar-sounder uses for the same
# reason: "non-critical-path client, starts after infra but in
# parallel with the decoder chain."
[client.lifecycle]
start_priority = 200

# Configuration interview (CONTRACT v0.8 §14).
[contract.config]
init = ["/usr/local/bin/mag-recorder", "config", "init"]
edit = ["/usr/local/bin/mag-recorder", "config", "edit"]

# Canonical installer.  Handles everything sigmond's installer can't:
# the magrec service user, dialout membership, mag-usb binary install
# to /usr/local/bin (prebuilt from bin/, or built via
# scripts/build-mag-usb.sh), /etc/udev/rules.d/99-PololuI2C.rules,
# the Python venv, and the symlinks below.  Idempotent.
install_script = "/opt/git/sigmond/mag-recorder/install.sh"

# Note: sigmond's installer also applies any kind="link" steps below
# after install.sh runs, so the symlinks here are belt-and-braces --
# install.sh creates them too, but if a later sigmond refactor wants
# to drive everything via deploy.toml the link steps already exist.

[[install.steps]]
kind = "link"
src  = "/opt/git/sigmond/mag-recorder/venv/bin/mag-recorder"
dst  = "/usr/local/bin/mag-recorder"

[[install.steps]]
kind = "link"
src  = "systemd/mag-recorder.service"
dst  = "/etc/systemd/system/mag-recorder.service"

# Daily package + upload pair.  The unit files are linked into
# /etc/systemd/system but NOT listed in [systemd].units below, so
# sigmond's lifecycle layer does not auto-enable them.  The
# operator turns the timer on with:
#
#     systemctl enable --now mag-recorder-upload.timer
#
# once a real magnetometer is wired up and PSWS uploads are
# desired (or earlier with `[uploader].enabled = false` if you
# want the unit to exit cleanly without uploading).
[[install.steps]]
kind = "link"
src  = "systemd/mag-recorder-upload.service"
dst  = "/etc/systemd/system/mag-recorder-upload.service"

[[install.steps]]
kind = "link"
src  = "systemd/mag-recorder-upload.timer"
dst  = "/etc/systemd/system/mag-recorder-upload.timer"

[[install.steps]]
kind     = "render"
src      = "config/mag-recorder-config.toml.template"
dst      = "/etc/mag-recorder/mag-recorder-config.toml"
if_absent = true

[[install.steps]]
kind = "mkdir"
dst  = "/var/lib/mag-recorder/upload"
owner = "magrec:magrec"
mode  = "0755"

[[install.steps]]
kind = "mkdir"
dst  = "/var/log/mag-recorder"
owner = "magrec:magrec"
mode  = "0755"

[systemd]
units = ["mag-recorder.service"]

[deps]
# install.sh installs the bundled mag-usb binary (bin/mag-usb -> /usr/local/bin),
# applies the udev rule, and runs `udevadm reload-rules/trigger`.  cmake and
# build-essential are NOT listed here: they are needed only on the from-source
# fallback path (scripts/build-mag-usb.sh, used when bin/mag-usb is absent or
# --force-build is passed), and that script installs them itself via apt.

[[deps.apt]]
name = "openssh-client"
note = "sftp client for PSWS uploads (matches hf-timestd Grape pipeline)"

[[deps.apt]]
name = "whiptail"
note = "optional UI for `mag-recorder config init|edit` interactive wizard; if absent, the stdin-prompt fallback in configurator.py is used"

[[deps.pypi]]
name = "hs-uploader"
venv = "/opt/git/sigmond/mag-recorder/venv"
note = "shared uploader library; PSWS magnetometer transport pending (TODO)"

# ---------------------------------------------------------------------------
# Sigmond UI hooks (drop-in registration for `smd watch` + TUI Activity).
# mag-recorder is a singleton (one magnetometer per host), so no
# `per_instance` flag — `smd watch mag` ignores --instance.
# Consumed by lib/sigmond/client_features.py.
# ---------------------------------------------------------------------------

[client_features.watch]
verb         = "mag"
description  = "RM3100 magnetometer sample rollup + daily PSWS upload"
verbose      = true
per_instance = false

# ---------------------------------------------------------------------------
# Single-host uploader pipeline (Stage 6).  `smd admin uploader manifest`
# reads this [[hs_uploader.pipeline]] block from every enabled client,
# substitutes per-site identity ({station_id}/{instrument_id} resolved from
# this client's own [station] config), and renders /etc/hs-uploader/
# pipelines.toml for the single-host daemon.  The block shape IS the
# [[pipeline]] shape hs_uploader.pipeline_factory consumes.  mag-recorder is
# skipped at generation until its PSWS station id is filled.
# ---------------------------------------------------------------------------

# Magnetometer daily zip -> PSWS
[[hs_uploader.pipeline]]
name = "mag-psws"
max_records_per_pump = 32
[hs_uploader.pipeline.source]
type = "filetree"
root = "/var/lib/mag-recorder/upload"
patterns = ["*.zip"]
retention = "keep"
table = "mag.daily_zip"
source_id = "mag-datasets:/var/lib/mag-recorder/upload"
[hs_uploader.pipeline.transport]
type = "psws_dataset"
instrument_id = "{instrument_id}"
host = "pswsnetwork.eng.ua.edu"
table = "mag.daily_zip"
sftp_user = "{station_id}"
name = "psws-mag-sftp:pswsnetwork.eng.ua.edu:{station_id}"
[hs_uploader.pipeline.identity]
station_id = "{station_id}"
